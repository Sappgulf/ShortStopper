name: Build Release Zips

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  chrome-zip:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build Chrome zip
        run: ./scripts/package-chrome.sh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ShortStopper-chrome
          path: dist/ShortStopper-chrome.zip

      - name: Publish GitHub Release (tag only)
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" dist/ShortStopper-chrome.zip \
            --title "${GITHUB_REF_NAME}" \
            --generate-notes
